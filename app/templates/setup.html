<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הגדרת משתמש ראשון — משק הבית שלי</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>משק הבית שלי</h1>
      <h2>יצירת משתמש ראשון</h2>
      <p style="color:var(--text-muted);margin-bottom:1rem;font-size:.9rem;">פעולה זו זמינה פעם אחת בלבד</p>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="auth-error">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}
      <form method="post" action="{{ url_for('auth.setup') }}">
        <div class="form-group">
          <label for="username">שם משתמש</label>
          <input type="text" id="username" name="username" autofocus required />
        </div>
        <div class="form-group">
          <label for="password">סיסמה (לפחות 8 תווים)</label>
          <input type="password" id="password" name="password" minlength="8" required />
        </div>
        <div class="form-group">
          <label for="confirm">אימות סיסמה</label>
          <input type="password" id="confirm" name="confirm" minlength="8" required />
        </div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:.5rem;">צור חשבון וכנס</button>
      </form>
    </div>
  </div>
</body>
</html>
