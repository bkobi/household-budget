<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>משק הבית שלי</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>משק הבית שלי</h1>
      <div class="month-nav">
        <button id="prevMonth">‹</button>
        <span id="monthLabel"></span>
        <button id="nextMonth">›</button>
      </div>
      <div class="export-actions">
        <button id="btnExcel" class="btn-export">📊 ייצוא לאקסל</button>
        <button id="btnPdf"   class="btn-export">📄 דוח PDF</button>
        <a href="{{ url_for('auth.logout') }}" class="btn-logout">יציאה</a>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="overview">סקירה כללית</button>
      <button class="tab" data-tab="transactions">הוצאות</button>
      <button class="tab" data-tab="budget">תקציב</button>
      <button class="tab" data-tab="stats">סטטיסטיקות</button>
    </nav>

    <!-- OVERVIEW -->
    <section id="tab-overview" class="tab-content active">
      <div class="metrics" id="metrics"></div>

      <div id="alertsBox" class="alerts-box" style="display:none;"></div>

      <div class="two-col">
        <div class="card">
          <h2>הוצאות לפי קטגוריה</h2>
          <canvas id="donutChart" height="220"></canvas>
        </div>
        <div class="card">
          <h2>מעקב תקציב</h2>
          <div id="budgetBars"></div>
        </div>
      </div>
    </section>

    <!-- TRANSACTIONS -->
    <section id="tab-transactions" class="tab-content">
      <div class="card">
        <h2>הוסף הוצאה</h2>
        <form id="addForm" class="add-form">
          <div class="form-row">
            <div class="form-group">
              <label>תיאור</label>
              <input type="text" id="fDesc" placeholder="לדוגמה: סופרמרקט" required />
            </div>
            <div class="form-group">
              <label>סכום (₪)</label>
              <input type="number" id="fAmount" min="0.01" step="0.01" placeholder="0.00" required />
            </div>
            <div class="form-group">
              <label>קטגוריה</label>
              <select id="fCat">
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.icon }} {{ cat.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="form-group">
              <label>תאריך</label>
              <input type="date" id="fDate" required />
            </div>
          </div>
          <button type="submit" class="btn-primary">+ הוסף הוצאה</button>
        </form>
      </div>
      <div class="card" style="margin-top:1rem;">
        <h2>רשימת הוצאות</h2>
        <div id="txnList"></div>
      </div>
    </section>

    <!-- BUDGET -->
    <section id="tab-budget" class="tab-content">
      <div class="card">
        <h2>הכנסה חודשית</h2>
        <div class="income-row">
          <span>💰 הכנסה כוללת</span>
          <input type="number" id="incomeInput" placeholder="0" min="0" />
          <button class="btn-primary" onclick="saveIncome()">שמור</button>
        </div>
      </div>
      <div class="card" style="margin-top:1rem;">
        <h2>תקציב לפי קטגוריה</h2>
        <div id="budgetSetup"></div>
      </div>
    </section>

    <!-- STATS -->
    <section id="tab-stats" class="tab-content">
      <div class="card">
        <h2>מגמת הוצאות שנתית</h2>
        <canvas id="trendChart" height="260"></canvas>
      </div>
    </section>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    window.CATEGORIES = {{ categories | tojson }};
  </script>
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
